<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Modo app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Academia">
<meta name="mobile-web-app-capable" content="yes">

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">

<title>Academia PRO</title>

<style>
body {
  font-family: Arial;
  background:#eef2f7;
  padding:10px;
  margin:0;
  -webkit-text-size-adjust: 100%;
}

.container { max-width:1000px; margin:auto; padding-bottom:50px; }

.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

table { width:100%; border-collapse:collapse; }

td, th {
  border:1px solid #ccc;
  padding:5px;
  text-align:center;
}

select, input {
  width:100%;
  padding:6px;
  font-size:16px;
}

button {
  width:100%;
  padding:12px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.add { background:#2563eb; color:white; }
.calc { background:#10b981; color:white; }

.ok { background:#bbf7d0; }   /* verde */
.bad { background:#fecaca; }  /* rojo */
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h3>Crear alumno</h3>
  <input id="nombre" placeholder="Nombre">
  <input id="telefono" placeholder="Teléfono">
  <input id="pagadas" placeholder="Clases pagadas">
  <button class="add" onclick="addAlumno()">Guardar alumno</button>
</div>

<div class="card">
  <h3>Cuadrante semanal</h3>
  <table id="tabla"></table>
</div>

<div class="card">
  <button class="calc" onclick="resumen()">📊 Ver resumen</button>
</div>

</div>

<script>
let alumnos = JSON.parse(localStorage.getItem("alumnos")) || [];
let cuadrante = JSON.parse(localStorage.getItem("cuadrante")) || {};

const dias = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
const horas = ["16:00","17:00","18:00","19:00"];

function save() {
  localStorage.setItem("alumnos", JSON.stringify(alumnos));
  localStorage.setItem("cuadrante", JSON.stringify(cuadrante));
}

function addAlumno() {
  if(!nombre.value || !telefono.value) return alert("Faltan datos");

  alumnos.push({
    nombre: nombre.value,
    telefono: telefono.value,
    pagadas: parseInt(pagadas.value) || 0
  });

  nombre.value = "";
  telefono.value = "";
  pagadas.value = "";

  save();
  crearTabla();
}

function crearSelect(id) {
  let html = `<select onchange="guardar('${id}', this)">`;
  html += `<option value="">-</option>`;

  alumnos.forEach((a,i)=>{
    html += `<option value="${i}-clase">${a.nombre} (Clase)</option>`;
    html += `<option value="${i}-examen">${a.nombre} (Examen)</option>`;
  });

  html += `</select>`;
  return html;
}

function crearTabla() {
  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  let header = "<tr><th>Hora</th>";
  dias.forEach(d=> header+=`<th>${d}</th>`);
  header+="</tr>";
  tabla.innerHTML+=header;

  horas.forEach(h=>{
    let fila = `<tr><td>${h}</td>`;
    dias.forEach(d=>{
      let id = h+"-"+d;
      fila += `<td id="${id}">${crearSelect(id)}</td>`;
    });
    fila+="</tr>";
    tabla.innerHTML+=fila;
  });

  cargar();
  colorear();
}

function guardar(id, select) {
  cuadrante[id] = select.value;
  save();
  colorear();
}

function contarUsadas(idx) {
  let total = 0;

  Object.values(cuadrante).forEach(v=>{
    if(v.startsWith(idx+"-clase")) total+=1;
    if(v.startsWith(idx+"-examen")) total+=2;
  });

  return total;
}

function colorear() {
  Object.keys(cuadrante).forEach(id=>{
    let valor = cuadrante[id];
    let td = document.getElementById(id);

    if(!valor) return;

    let idx = valor.split("-")[0];
    let usadas = contarUsadas(idx);
    let pagadas = alumnos[idx].pagadas;

    td.className = usadas <= pagadas ? "ok" : "bad";
  });
}

function cargar() {
  Object.keys(cuadrante).forEach(id=>{
    let select = document.querySelector(`#${id} select`);
    if(select) select.value = cuadrante[id];
  });
}

function resumen() {
  let texto = "";

  alumnos.forEach((a,i)=>{
    let usadas = contarUsadas(i);
    texto += `${a.nombre}: ${usadas}/${a.pagadas}\n`;
  });

  alert(texto);
}

crearTabla();

// Fix táctil iPhone
document.addEventListener("touchstart", function(){}, true);
</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</scrip

</body>
</html>
